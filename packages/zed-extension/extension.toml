id = "param-code"
name = "param Code"
version = "0.1.0"
schema_version = 1
authors = ["param Team"]
description = "param Code Agent Server Extension for Zed"
repository = "https://github.com/paramLM/param-code"

[agent_servers.param-code]
name = "param Code"
icon = "param-code.svg"

[agent_servers.param-code.targets.darwin-aarch64]
