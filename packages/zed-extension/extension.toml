args = ["./package/cli.js", "--acp"]

[agent_servers.param-code.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@param-code/param-code/-/param-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.param-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@param-code/param-code/-/param-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.param-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@param-code/param-code/-/param-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

